<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="main.css" />
  <title>DUXCASINO| HOME</title>
</head>

<body>
  <nav class="navbar">
    <a class="logo-img" href="index.html">
      <img class="logo-img" src="./assets/logo.png" alt="DUXCASINO Logo" />
    </a>
    <!-- nav menu -->
    <div class="nav-menu">
      <a href="index.html" class="nav-link">ALL GAMES</a>
      <a href="#" class="nav-link">PROMOTIONS</a>
      <a href="#" class="nav-link">VIP</a>
      <a href="#" class="nav-link">DUX BOXES</a>
      <a href="#" class="nav-link">PATH TO REWARDS</a>
    </div>
    <!-- NAV BUTTONS -->
    <div class="nav-btn">
      <a href="#" class="btn">LOGIN</a>
      <a href="#" class="btn">SIGN UP</a>
    </div>
    <!-- country -->
    <div class="country">
      <img src="./assets/GB.png" alt="Country Flag" />
    </div>
  </nav>

  <!-- hero section -->
  <div class="hero">
    <div class="hero-content">
      <div class="welcome-package">
        <h2>welcome package</h2>
        <h1>€500</h1>
        <h3>+150 FREE SPINS</h3>
        <button class="welcome-package-btn">JOIN NOW</button>
      </div>

      <div class="sponsors">
        <img src="./assets/visa.png" alt="Visa Logo" />
        <img src="./assets/mastercard.png" alt="Mastercard Logo" />
        <img src="./assets/Maestro.png" alt="Maestro Logo" />
        <img src="./assets/Jeton.png" alt="Jeton Logo" />
        <img src="./assets/Rapid.png" alt="Rapid Logo" />
      </div>
    </div>
  </div>

  <!-- rating section -->
  <div class="rating">
    <img src="./assets/Rating score.png" alt="Rating" />
    <img src="./assets/Rating score (1).png" alt="Rating" />
    <img src="./assets/Rating score (2).png" alt="Rating" />
    <img src="./assets/Rating score (3).png" alt="Rating" />
    <img src="./assets/Rating score (4).png" alt="Rating" />
    <img src="./assets/Rating score (5).png" alt="Rating" />
  </div>

  <!--  popular games -->
  <div class="popular-games">
    <div class="header">
      <h2>Popular Games</h2>
    </div>
    <div class="popular-content">
      <img src="./assets/horse.png" alt="Horse Game">
      <img src="./assets/gal.png" alt="gal game">
      <img src="./assets/maze.png" alt="maze Game">
      <img src="./assets/bonanaza.png" alt="bonanza Game">
      <img src="./assets/sugar.png" alt="sugar Game">
      <img src="./assets/book.png" alt="book Game">
      <img src="./assets/horns.png" alt="horns Game">
      <img src="./assets/olympus.png" alt="olympus Game">
      <img src="./assets/hit-bar.png" alt="hit-bar Game">
      <img src="./assets/snakes.png" alt="snakes Game">
    </div>
  </div>
  <!-- view more -->
  <div class="view-more">
    <a href="#" class="btn">VIEW MORE GAMES</a>
  </div>

</body>

</html>
